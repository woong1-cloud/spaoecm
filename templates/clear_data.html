{% extends "base.html" %}
{% block content %}
  <div class="container" style="max-width: 800px;">
    <div class="card shadow-lg border-danger">
      <div class="card-header bg-danger text-white">
        <h2 class="h4 mb-0">
          <i class="bi bi-exclamation-triangle-fill"></i>
          데이터 초기화
        </h2>
      </div>
      <div class="card-body p-4">
        <div class="alert alert-danger" role="alert">
          <h4 class="alert-heading">
            <i class="bi bi-exclamation-octagon-fill"></i>
            경고: 이 작업은 되돌릴 수 없습니다!
          </h4>
          <p class="mb-0">모든 스냅샷 데이터가 영구적으로 삭제됩니다.</p>
        </div>

        <div class="mb-4">
          <h5>현재 데이터 현황</h5>
          <ul class="list-group">
            <li class="list-group-item d-flex justify-content-between align-items-center">
              총 데이터 행 수
              <span class="badge bg-primary rounded-pill">{{ "{:,}".format(total_count) }}개</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center">
              스냅샷 날짜 수
              <span class="badge bg-info rounded-pill">{{ dates_count }}일</span>
            </li>
          </ul>
        </div>

        <form method="post" action="{{ url_for('clear_data') }}" onsubmit="return confirm('정말로 모든 데이터를 삭제하시겠습니까?');">
          <div class="mb-3">
            <label for="confirm" class="form-label fw-semibold">
              삭제를 확인하려면 <code>DELETE</code>를 입력하세요:
            </label>
            <input 
              type="text" 
              class="form-control form-control-lg" 
              id="confirm" 
              name="confirm" 
              placeholder="DELETE" 
              required 
              autocomplete="off"
              style="font-family: monospace;">
            <div class="form-text">대소문자를 정확히 입력해야 합니다.</div>
          </div>

          <div class="d-flex gap-2">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-lg flex-fill">
              <i class="bi bi-x-circle"></i>
              취소
            </a>
            <button type="submit" class="btn btn-danger btn-lg flex-fill">
              <i class="bi bi-trash-fill"></i>
              모든 데이터 삭제
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="mt-3 text-center">
      <small class="text-muted">
        <i class="bi bi-info-circle"></i>
        삭제 후에는 데이터를 복구할 수 없으니 신중하게 결정하세요.
      </small>
    </div>
  </div>
{% endblock %}
