{% extends "base.html" %}
{% block content %}
  <div class="container" style="max-width: 520px;">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="h5 fw-semibold mb-3">비밀번호 변경</h2>
        <p class="text-muted small mb-4">
          현재 비밀번호를 입력한 뒤, 새로 사용할 비밀번호를 설정하세요.
        </p>

        <form method="post" action="{{ url_for('change_password_post') }}">
          <div class="mb-3">
            <label class="form-label">현재 비밀번호</label>
            <input
              class="form-control"
              type="password"
              name="current_password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">신규 비밀번호</label>
            <input
              class="form-control"
              type="password"
              name="new_password"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">신규 비밀번호 확인</label>
            <input
              class="form-control"
              type="password"
              name="confirm_password"
              autocomplete="new-password"
              required
            />
          </div>

          <button class="btn btn-primary w-100" type="submit">비밀번호 변경</button>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
