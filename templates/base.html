<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet" />
  </head>
  <body class="bg-soft">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-dark">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">{{ title }}</a>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-light" href="{{ url_for('dashboard') }}">
            <i class="bi bi-speedometer2"></i> 대시보드
          </a>
          <a class="btn btn-sm btn-outline-light" href="{{ url_for('upload_get') }}">
            <i class="bi bi-upload"></i> 업로드
          </a>
          <a class="btn btn-sm btn-outline-light" href="{{ url_for('backup_page') }}">
            <i class="bi bi-download"></i> 백업
          </a>
          {% if show_clear_data %}
          <a class="btn btn-sm btn-outline-danger" href="{{ url_for('clear_data') }}">
            <i class="bi bi-trash"></i> 초기화
          </a>
          {% endif %}
          <a class="btn btn-sm btn-outline-light" href="{{ url_for('change_password_get') }}">
            <i class="bi bi-key"></i> 비밀번호
          </a>
          <a class="btn btn-sm btn-outline-light" href="{{ url_for('logout') }}">
            <i class="bi bi-box-arrow-right"></i> 로그아웃
          </a>
        </div>
      </div>
    </nav>

    <main class="container-fluid py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="container" style="max-width: 1100px;">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='table-sort.js') }}"></script>
  </body>
</html>
