<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet" />
  </head>
  <body class="bg-soft">
    <main class="container py-5" style="max-width: 520px;">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h1 class="h4 fw-semibold mb-2">{{ title }}</h1>
          <p class="text-muted mb-4">나만 확인할 수 있도록 비밀번호를 입력하세요.</p>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} mb-3" role="alert">{{ message }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <form method="post" action="{{ url_for('login_post') }}">
            <div class="mb-3">
              <label class="form-label">비밀번호</label>
              <input class="form-control" type="password" name="password" autocomplete="current-password" required />
            </div>
            <button class="btn btn-primary w-100" type="submit">로그인</button>
          </form>

          <div class="small text-muted mt-3">
            - 처음 기본 비밀번호는 <code>1234</code> 입니다.<br />
            - 로그인 후 상단 메뉴의 <strong>비밀번호 변경</strong> 버튼에서 언제든 수정할 수 있습니다.
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
